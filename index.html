<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Grace and Company Home Care">

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="images/tab_icon.ico">

        <script defer src="scripts/slideshow.js"></script>

        <title>Grace and Company Home Care</title>

    </head>
    <body>

        <header class="header">
            <div class="top-bar">
                <div class="top-bar_content">
                    <section class="phone">
                        <i class="fa-solid fa-phone"></i>
                        1-***-***-****
                    </section>

                    <section class="email">
                        <i class="fa-solid fa-envelope"></i>
                        email@placeholder
                    </section>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="bottom-bar_content">
                    <a href="#top" class="logo">
                        <img src="images/logo.png" class="logo_img">
                        <span class="logo_text">Grace & Company Home Care</span>
                    </a>
                </div>
            </div>
        </header>

        <!-- Slideshow container -->
        <div class="slideshow-container">

        <!-- Full-width images with number and caption text -->
        <div class="mySlides fade">
            <img src="images/slide_img1.jpg" class="slide-image">
        </div>

        <div class="mySlides fade">
            <img src="images/slide_img2.jpg" class="slide-image">
        </div>

        <div class="mySlides fade">
            <img src="images/slide_img3.jpg" class="slide-image">
        </div>

        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br>

        <!-- The dots/circles -->
        <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        </div>

    </body>
</html>
