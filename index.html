<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Grace and Company Home Care">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="images/tab_icon.ico">
        <title>Grace and Company Home Care</title>
    </head>
    <body>
        <header>
            <div class="navbar">
                <div class="logo">
                    <h1><a href="index.html"><img src="images/logo.png">GRACE &amp; COMPANY, LLC </a></h1>

                    <ul class="links">
                        <li>
                            <a href="index.html">Home</a>
                        </li>
                        <li>
                            <a href="#about">About Us</a>
                        </li>
                        <li>
                            <a href="#contact">Contact Us</a>
                        </li>
                    </ul>
                    
                </div>
            </div>
        </header>

        <!-- Slideshow container -->
        <div class="slideshow-container">

        <!-- Full-width images with number and caption text -->
        <div class="mySlides fade">
            <img src="images/slide_img1.jpg" class="slide-image">
        </div>

        <div class="mySlides fade">
            <img src="images/slide_img2.jpg" class="slide-image">
        </div>

        <div class="mySlides fade">
            <img src="images/slide_img3.jpg" class="slide-image">
        </div>

        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br>

        <!-- The dots/circles -->
        <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        </div>

        <script src="scripts/slideshow.js"></script>
    </body>
</html>
