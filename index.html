<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Grace and Company Home Care">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="images/tab_icon.ico">
        <title>Grace and Company Home Care</title>
    </head>
    <body>
        <header>
            <script src="scripts/slideshow.js" defer></script>
            <h1><a href="index.html">GRACE &amp; COMPANY, LLC </a></h1>
        </header>

        <!-- Slideshow container -->
        <div class="slideshow-container">

            <!-- Full-width images with number and caption text -->
            <div class="mySlides fade">
                <div class="numbertext">1 / 3</div>
                <img src="images/slide_img1.jpg" style="width:100%">
                <div class="caption">Caption Text</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">2 / 3</div>
                <img src="images/slide_img2.jpg" style="width:100%">
                <div class="caption">Caption Text</div>
            </div>

            <div class="mySlides fade">
                <div class="numbertext">3 / 3</div>
                <img src="images/slide_img3.jpg" style="width:100%">
                <div class="caption">Caption Text</div>
            </div>

            <!-- Next and previous buttons -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>

        </div>
        <br>

        <!-- the dots/circles -->
        <div style="text-align:center">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>

    </body>
</html>
